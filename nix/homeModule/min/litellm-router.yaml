---
model_list:
  - model_name: prometheus-main-deepseek
    litellm_params:
      model: prometheus-main-deepseek
      api_base: http://127.0.0.1:11436/v1
      api_key: sk-no-key-required
    order: 1
  - model_name: prometheus-subagent-qwen25
    litellm_params:
      model: prometheus-subagent-qwen25
      api_base: http://127.0.0.1:11436/v1
      api_key: sk-no-key-required
    order: 2
  - model_name: prometheus-fast-llama33
    litellm_params:
      model: prometheus-fast-llama33
      api_base: http://127.0.0.1:11436/v1
      api_key: sk-no-key-required
    order: 3
  - model_name: cloud-reasoning
    litellm_params:
      model: openai/gpt-4o
      api_base: https://api.openai.com/v1
      api_key: os.environ/OPENAI_API_KEY
    order: 10
  - model_name: cloud-coder
    litellm_params:
      model: openai/gpt-4o-mini
      api_base: https://api.openai.com/v1
      api_key: os.environ/OPENAI_API_KEY
    order: 11
  - model_name: cloud-fast
    litellm_params:
      model: openai/gpt-4o-mini
      api_base: https://api.openai.com/v1
      api_key: os.environ/OPENAI_API_KEY
    order: 12
router_settings:
  enable_pre_call_checks: true
  model_group_alias:
    main: prometheus-main-deepseek
    subagent: prometheus-subagent-qwen25
    fast: prometheus-fast-llama33
  fallbacks:
    - main:
      - cloud-reasoning
      - cloud-coder
    - subagent:
      - cloud-coder
      - cloud-fast
    - fast:
      - cloud-fast
litellm_settings:
  default_fallbacks:
    - fast
    - cloud-fast
  drop_params: true
  modify_params: true
  logging:
    level: info
